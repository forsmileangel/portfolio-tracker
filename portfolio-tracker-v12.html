<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Tracker - 單檔 HTML 版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; 
            overflow-x: hidden; 
            overflow-y: auto; 
            font-family: 'Noto Sans TC', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(135deg, #0a1628 0%, #1e3a5f 50%, #0f2744 100%);
            padding: 2rem;
            position: relative;
            color: #e2e8f0;
        }
        
        .glass-card { background: linear-gradient(135deg, rgba(20,40,70,0.95) 0%, rgba(10,25,45,0.98) 100%); backdrop-filter: blur(20px); border: 2px solid rgba(251,191,36,0.3); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 60px rgba(251,191,36,0.1), inset 0 1px 0 rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(251,191,36,0.1), transparent); transition: left 0.5s; }
        .glass-card:hover::before { left: 100%; }
        
        .stat-card { background: linear-gradient(135deg, rgba(251,191,36,0.15) 0%, rgba(245,158,11,0.1) 100%); border: 2px solid rgba(251,191,36,0.4); border-radius: 16px; padding: 1.5rem; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(251,191,36,0.2), inset 0 1px 0 rgba(255,255,255,0.1); }
        .stat-card::before { content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(251,191,36,0.2) 0%, transparent 70%); animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
        
        .holding-row { background: linear-gradient(135deg, rgba(15,30,60,0.6) 0%, rgba(10,20,40,0.8) 100%); border: 2px solid rgba(59,130,246,0.3); border-left: 4px solid #fbbf24; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; transition: all 0.3s ease; animation: slideIn 0.5s ease; position: relative; overflow: hidden; }
        .holding-row::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%); box-shadow: 0 0 20px rgba(251,191,36,0.8); }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        input, select { width: 100%; padding: 0.75rem 1rem; background: rgba(10,25,45,0.8); border: 2px solid rgba(59,130,246,0.3); border-radius: 10px; color: #fbbf24; font-size: 0.95rem; transition: all 0.3s ease; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; }
        input:focus, select:focus { outline: none; border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.3), inset 0 1px 0 rgba(255,255,255,0.1); background: rgba(15,30,60,0.9); }
        
        button { padding: 0.75rem 1.5rem; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: 'Noto Sans TC', sans-serif; text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden; }
        button::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.2); transform: translate(-50%,-50%); transition: width 0.6s, height 0.6s; }
        button:hover::before { width: 300px; height: 300px; }
        
        .btn-primary { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #0a1628; box-shadow: 0 4px 15px rgba(251,191,36,0.4); }
        .btn-delete { background: rgba(239,68,68,0.2); color: #ef4444; padding: 0.5rem; border-radius: 8px; border: 2px solid rgba(239,68,68,0.4); }
        
        .profit { color: #10b981; text-shadow: 0 0 10px rgba(16,185,129,0.5); }
        .loss { color: #ef4444; text-shadow: 0 0 10px rgba(239,68,68,0.5); }
        .mono { font-family: 'Courier New', monospace; font-weight: 600; }
        
        .market-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.75rem; background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(37,99,235,0.3) 100%); border: 2px solid rgba(59,130,246,0.4); border-radius: 8px; font-size: 0.85rem; font-weight: 700; }
        
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #pieCanvas { max-width: 100%; height: 400px; }
    </style>
</head>
<body>
    <!-- 背景裝飾 -->
    <div style="position:fixed; top:0; left:0; right:0; bottom:0; background-image:linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px); background-size:50px 50px; pointer-events:none; z-index:0;"></div>
    <div style="position:fixed; top:10%; right:10%; width:300px; height:300px; background:radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%); border-radius:50%; filter:blur(60px); pointer-events:none; z-index:0; animation:float 6s ease-in-out infinite;"></div>
    <div style="position:fixed; bottom:20%; left:5%; width:400px; height:400px; background:radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%); border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:float 8s ease-in-out infinite reverse;"></div>

    <div style="max-width:1200px; margin:0 auto; position:relative; z-index:1;">
        
        <!-- Currency Toggle -->
        <div style="position:fixed; top:1.25rem; right:1.25rem; z-index:999; display:flex; border-radius:10px; overflow:hidden; border:2px solid rgba(251,191,36,0.35); box-shadow:0 4px 20px rgba(0,0,0,0.4);">
            <button id="currency-usd" onclick="setCurrency('USD')" style="padding:0.45rem 1rem; border:none; font-weight:700; font-size:0.85rem; background:linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color:#0a1628;">$ USD</button>
            <button id="currency-twd" onclick="setCurrency('TWD')" style="padding:0.45rem 1rem; border:none; font-weight:700; font-size:0.85rem; background:rgba(10,22,40,0.92); color:#64748b;">NT$ TWD</button>
        </div>

        <!-- Header -->
        <div style="margin-bottom:2rem; text-align:center;">
            <div style="display:inline-block; position:relative; padding:1rem 2rem; background:linear-gradient(135deg, rgba(251,191,36,0.1) 0%, rgba(245,158,11,0.05) 100%); border-radius:20px; border:2px solid rgba(251,191,36,0.3); box-shadow:0 0 40px rgba(251,191,36,0.2); margin-bottom:0.5rem;">
                <h1 style="color:#fbbf24; font-size:2.5rem; font-weight:900; margin-bottom:0.25rem; text-transform:uppercase; letter-spacing:3px; text-shadow:0 0 20px rgba(251,191,36,0.5); background:linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #fbbf24 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-size:200% auto; animation:shimmer 3s linear infinite;">Portfolio Tracker</h1>
                <div style="display:flex; align-items:center; justify-content:center; gap:0.5rem; color:#93c5fd; font-size:0.9rem; font-weight:500; letter-spacing:2px; text-transform:uppercase;">台股 • 美股 • 港股 持倉管理系統</div>
            </div>
        </div>

        <!-- Stats -->
        <div id="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:1.5rem; margin-bottom:2rem;"></div>

        <!-- Google Sheet URL -->
        <div style="display:flex; gap:0.75rem; margin-bottom:1rem; align-items:center; flex-wrap:wrap;">
            <label style="color:#fbbf24; font-size:0.85rem; font-weight:600; white-space:nowrap;">📊 Google Sheet CSV：</label>
            <input id="sheet-url" type="text" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vQnBPPnq7jgMZ3oZ8UVaxe77InNipxW-ItNAoqxQrAgnKfLNqX1P4xxOLMqKGjKWTRIN-VZ4SkgKFBt/pub?gid=0&single=true&output=csv" style="flex:1; min-width:200px; padding:0.55rem 0.75rem; background:rgba(10,25,45,0.8); border:1px solid rgba(59,130,246,0.3); border-radius:8px; color:#e2e8f0; font-size:0.85rem;">
            <span style="color:#10b981; font-size:0.8rem; white-space:nowrap;">✓ 已設定</span>
        </div>

        <!-- Action Buttons -->
        <div style="display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap;">
            <button onclick="showImportConfirm()" class="btn-primary" style="flex:1; min-width:170px; display:flex; align-items:center; justify-content:center; gap:0.5rem;"><span style="font-size:18px;">📤</span>匯入持倉數據</button>
            <button onclick="exportHoldings()" style="flex:1; min-width:150px; padding:0.75rem 1.5rem; background:rgba(99,102,241,0.1); color:#818cf8; border:1px solid rgba(99,102,241,0.3); border-radius:8px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:0.5rem;">📥 匯出持倉數據</button>
            <button onclick="refreshAllData()" id="refresh-btn" style="flex:1; min-width:180px; padding:0.75rem 1.5rem; background:rgba(16,185,129,0.1); color:#10b981; border:1px solid rgba(16,185,129,0.3); border-radius:8px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:0.5rem;"><span id="refresh-icon" style="display:inline-block;">🔄</span><span id="refresh-text">一鍵更新報價 + 匯率</span></button>
            <button onclick="manualPriceReview()" style="flex:1; min-width:140px; padding:0.75rem 1.5rem; background:rgba(251,191,36,0.1); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); border-radius:8px; font-weight:600;">✏️ 手動輸入報價</button>
            <button onclick="undoLastAction()" id="undo-btn" style="flex:1; min-width:140px; padding:0.75rem 1.5rem; background:rgba(251,191,36,0.1); color:#fbbf24; border:1px solid rgba(251,191,36,0.3); border-radius:8px; font-weight:600;">↩ 還原上一步 <span id="undo-count">(0)</span></button>
        </div>

        <!-- Pie Chart -->
        <div id="pie-section" class="glass-card" style="padding:2rem; margin-bottom:2rem; display:none;">
            <h2 style="color:#f1f5f9; font-size:1.25rem; font-weight:600; margin-bottom:1.5rem;">持倉分布圖</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:2rem; align-items:start;">
                <div><canvas id="pieCanvas" width="400" height="400"></canvas></div>
                <div>
                    <h3 style="color:#fbbf24; font-size:1.1rem; font-weight:700; margin-bottom:1rem; text-transform:uppercase; letter-spacing:1px;">持倉占比明細</h3>
                    <div id="pie-legend" style="display:flex; flex-direction:column; gap:0.2rem; max-height:400px; overflow-y:auto; padding-right:0.5rem;"></div>
                </div>
            </div>
        </div>

        <!-- Trade Form -->
        <div class="glass-card" style="padding:2rem; margin-bottom:2rem;">
            <div style="display:flex; gap:0; margin-bottom:1.5rem; border-radius:12px; overflow:hidden; border:2px solid rgba(148,163,184,0.15); width:fit-content;">
                <button onclick="setTradeType('buy')" id="buy-btn" style="padding:0.6rem 2rem; background:linear-gradient(135deg, #10b981 0%, #059669 100%); color:#0a1628; font-weight:700; font-size:1rem;">▲ 買入</button>
                <button onclick="setTradeType('sell')" id="sell-btn" style="padding:0.6rem 2rem; background:rgba(15,30,60,0.6); color:#64748b; font-weight:700; font-size:1rem;">▼ 賣出</button>
            </div>
            <p id="trade-hint" style="color:#64748b; font-size:0.85rem; margin-bottom:1.5rem; margin-top:-0.5rem;">買入時若代碼已存在將自動加倉並重算加權平均成本</p>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:1rem;">
                <div><label style="color:#cbd5e1; font-size:0.85rem; margin-bottom:0.5rem; display:block;">市場</label><select id="form-market"><option value="US">🇺🇸 美股</option><option value="TW">🇹🇼 台股</option><option value="HK">🇭🇰 港股</option></select></div>
                <div><label style="color:#cbd5e1; font-size:0.85rem; margin-bottom:0.5rem; display:block;">股票代碼 *</label><input id="form-symbol" type="text" placeholder="例: AAPL, 2330, 0700" style="text-transform:uppercase;"></div>
                <div><label id="form-qty-label" style="color:#cbd5e1; font-size:0.85rem; margin-bottom:0.5rem; display:block;">買入股數 *</label><input id="form-quantity" type="number" step="0.0001" placeholder="數量"></div>
                <div><label id="form-price-label" style="color:#cbd5e1; font-size:0.85rem; margin-bottom:0.5rem; display:block;">買入價格 *</label><input id="form-cost" type="number" step="0.0001" placeholder="此次買入均價"></div>
            </div>
            <button onclick="addHolding()" style="margin-top:1.5rem; width:100%; padding:0.85rem; background:linear-gradient(135deg, #10b981 0%, #059669 100%); color:#0a1628; font-weight:700; font-size:1rem;">▲ 確認買入</button>
        </div>

        <!-- Holdings Table -->
        <div id="table-section" class="glass-card" style="padding:2rem; margin-bottom:2rem; overflow-x:auto; display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.5rem;">
                <h2 style="color:#f1f5f9; font-size:1.25rem; font-weight:600; margin:0;">📊 持倉一覽</h2>
                <div style="display:flex; gap:1rem; font-size:0.8rem; color:#64748b;"><span>USD/TWD <strong id="rate-usd-twd" style="color:#fbbf24;">31.50</strong></span><span>HKD/TWD <strong id="rate-hkd-twd" style="color:#fbbf24;">4.0500</strong></span></div>
            </div>
            <table id="holdings-table" style="width:100%; border-collapse:collapse; font-size:0.9rem;"></table>
        </div>

        <!-- Holdings Detail -->
        <div class="glass-card" style="padding:2rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
                <h2 style="color:#f1f5f9; font-size:1.25rem; font-weight:600; margin:0;">持倉明細 (<span id="holdings-count">0</span>)</h2>
                <div style="color:#94a3b8; font-size:0.85rem;">點擊綠色/藍色欄位可編輯</div>
            </div>
            <div id="holdings-list"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="import-modal" onclick="if(event.target===this)hideImportModal()" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000;">
        <div class="glass-card" style="padding:2rem; max-width:500px; width:100%;">
            <h3 style="color:#f1f5f9; font-size:1.5rem; margin-bottom:1rem;">確認匯入持倉數據</h3>
            <p style="color:#cbd5e1; margin-bottom:1rem;">即將匯入 <strong>23 筆</strong> 持倉數據 (2026-03-24 最新收盤價)</p>
            <div style="display:flex; gap:1rem;">
                <button onclick="importData()" class="btn-primary" style="flex:1;">確認匯入</button>
                <button onclick="hideImportModal()" style="flex:1; background:rgba(71,85,105,0.3); color:#cbd5e1;">取消</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" onclick="if(event.target===this)hideConfirmModal()" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); display:none; align-items:center; justify-content:center; z-index:2000;">
        <div class="glass-card" style="padding:2rem; max-width:420px; width:100%; text-align:center;">
            <div style="font-size:2rem; margin-bottom:1rem;">⚠️</div>
            <p id="confirm-text" style="color:#f1f5f9; line-height:1.7; margin-bottom:1.75rem;"></p>
            <div style="display:flex; gap:0.75rem;">
                <button onclick="confirmDelete()" style="flex:1; background:linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color:#fff;">確認刪除</button>
                <button onclick="hideConfirmModal()" style="flex:1; background:rgba(71,85,105,0.4); color:#cbd5e1;">取消</button>
            </div>
        </div>
    </div>

    <div id="review-modal" onclick="if(event.target===this)hideReviewModal()" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:2000; padding:1rem;">
        <div class="glass-card" style="padding:2rem; max-width:700px; width:100%; max-height:85vh; overflow:hidden; display:flex; flex-direction:column;">
            <h3 style="color:#fbbf24; font-size:1.3rem; margin-bottom:0.5rem;">📋 股價更新審核</h3>
            <p style="color:#94a3b8; font-size:0.85rem; margin-bottom:1rem;">點擊「新價格」欄位可直接修改</p>
            <div style="flex:1; overflow-y:auto; margin-bottom:1rem;">
                <table id="review-table" style="width:100%; border-collapse:collapse; font-size:0.85rem;"></table>
            </div>
            <div style="display:flex; gap:0.75rem;">
                <button onclick="applyReviewedPrices()" style="flex:1; background:linear-gradient(135deg, #10b981 0%, #059669 100%); color:#0a1628;">✓ 套用勾選的價格</button>
                <button onclick="hideReviewModal()" style="flex:1; background:rgba(71,85,105,0.4); color:#cbd5e1;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全域變數 ====================
        let holdings = [];
        let history = [];
        let currency = 'USD';
        let exchangeRates = { USD_TWD: 31.5, HKD_TWD: 4.05 };
        let tradeType = 'buy';
        let priceReviewData = null;
        let chartInstance = null;
        let currentDeleteId = null;

        const IMPORT_DATA = {
            "holdings": [
                {"symbol": "7709.HK", "name": "CSOP SK Hynix 2x槓桿", "quantity": 5000.0, "avg_cost": 34.69, "current_price": 27.12},
                {"symbol": "9747.HK", "name": "三星電子 2x槓桿", "quantity": 2000.0, "avg_cost": 10.84, "current_price": 8.695},
                {"symbol": "AAOI", "name": "Applied Optoelectronics, Inc.", "quantity": 150.0, "avg_cost": 99.13, "current_price": 95.76},
                {"symbol": "AMDL", "name": "GraniteShares 2x Long AMD Daily", "quantity": 1500.0, "avg_cost": 6.26, "current_price": 12.32},
                {"symbol": "ASTX", "name": "Tradr 2X Long ASTS Daily ETF", "quantity": 150.0, "avg_cost": 44.0278, "current_price": 43.66},
                {"symbol": "AVGX", "name": "Defiance 2X Long AVGO Daily ETF", "quantity": 1250.0, "avg_cost": 26.92, "current_price": 38.35},
                {"symbol": "AXTI", "name": "AXT Inc", "quantity": 450.0, "avg_cost": 32.36, "current_price": 64.44},
                {"symbol": "BTC-USD", "name": "Bitcoin", "quantity": 0.49, "avg_cost": 105000.0, "current_price": 70650.0},
                {"symbol": "COHX", "name": "Tradr 2X Long COHR Daily ETF", "quantity": 550.0, "avg_cost": 29.13, "current_price": 30.07},
                {"symbol": "FBL", "name": "GraniteShares 2x Long META Daily", "quantity": 500.0, "avg_cost": 31.43, "current_price": 26.0},
                {"symbol": "GGLL", "name": "Direxion Daily GOOGL Bull 2X Sh", "quantity": 250.0, "avg_cost": 96.44, "current_price": 87.6},
                {"symbol": "LITX", "name": "Tradr 2X Long LITE Daily ETF", "quantity": 700.0, "avg_cost": 25.74, "current_price": 32.88},
                {"symbol": "MUU", "name": "Direxion Daily MU Bull 2X Share", "quantity": 922.0, "avg_cost": 118.51, "current_price": 177.1},
                {"symbol": "NBIG", "name": "Leverage Shares 2X Long NBIS Daily", "quantity": 2500.0, "avg_cost": 7.17, "current_price": 9.15},
                {"symbol": "NVDL", "name": "GraniteShares 2x Long NVDA Daily", "quantity": 750.0, "avg_cost": 42.3971, "current_price": 74.17},
                {"symbol": "ORCU", "name": "Direxion Daily ORCL Bull 2X ETF", "quantity": 500.0, "avg_cost": 15.83, "current_price": 10.62},
                {"symbol": "PLTU", "name": "Direxion Daily PLTR Bull 2X Share", "quantity": 1200.0, "avg_cost": 31.76, "current_price": 54.78},
                {"symbol": "SNXX", "name": "Tradr 2X Long SNDK Daily ETF", "quantity": 2250.0, "avg_cost": 43.03, "current_price": 46.37},
                {"symbol": "STX", "name": "Seagate Technology Holdings PLC", "quantity": 30.0, "avg_cost": 313.93, "current_price": 404.02},
                {"symbol": "TSLL", "name": "Direxion Daily TSLA Bull 1.5X Share", "quantity": 1250.0, "avg_cost": 15.0, "current_price": 12.95},
                {"symbol": "TSMX", "name": "Direxion Daily TSM Bull 2X Share", "quantity": 1000.0, "avg_cost": 32.33, "current_price": 58.05},
                {"symbol": "USD", "name": "ProShares Ultra Semiconductors", "quantity": 5900.0, "avg_cost": 7.4, "current_price": 50.7},
                {"symbol": "WDCX", "name": "Tradr 2X Long WDC Daily ETF", "quantity": 350.0, "avg_cost": 28.59, "current_price": 33.1}
            ]
        };

        // ==================== 計算統計（強制 100%） ====================
        function calculateStats() {
            let totalCostUSD = 0, totalValueUSD = 0, totalCostTWD = 0, totalValueTWD = 0;
            // 第一遍：計算各持倉的 USD/TWD 市值並累加總計
            let holdingsWithStats = holdings.map(h => {
                const costTotal = h.costPrice * h.quantity;
                const valueTotal = h.currentPrice * h.quantity;
                let costUSD = costTotal, valueUSD = valueTotal, costTWD = costTotal, valueTWD = valueTotal;
                if (h.symbol === '9747.HK') {
                    costTWD = costTotal * exchangeRates.USD_TWD; valueTWD = valueTotal * exchangeRates.USD_TWD;
                } else if (h.market === 'TW') {
                    costUSD = costTotal / exchangeRates.USD_TWD; valueUSD = valueTotal / exchangeRates.USD_TWD;
                } else if (h.market === 'HK') {
                    costUSD = costTotal * exchangeRates.HKD_TWD / exchangeRates.USD_TWD;
                    valueUSD = valueTotal * exchangeRates.HKD_TWD / exchangeRates.USD_TWD;
                    costTWD = costTotal * exchangeRates.HKD_TWD; valueTWD = valueTotal * exchangeRates.HKD_TWD;
                } else {
                    costTWD = costTotal * exchangeRates.USD_TWD; valueTWD = valueTotal * exchangeRates.USD_TWD;
                }
                totalCostUSD += costUSD; totalValueUSD += valueUSD; totalCostTWD += costTWD; totalValueTWD += valueTWD;
                // 先不算 percentage，等第一遍全部跑完才有正確的 totalValueUSD
                return { ...h, costTotalUSD: costUSD, valueTotalUSD: valueUSD, costTotalTWD: costTWD, valueTotalTWD: valueTWD, percentage: 0 };
            });

            // 第二遍：用完整的 totalValueUSD 計算正確的占比，再強制總和 = 100%
            if (totalValueUSD > 0) {
                holdingsWithStats.forEach(h => { h.percentage = (h.valueTotalUSD / totalValueUSD) * 100; });
            }
            const sumPct = holdingsWithStats.reduce((sum, h) => sum + h.percentage, 0);
            if (sumPct > 0) {
                holdingsWithStats.forEach(h => h.percentage = (h.percentage / sumPct) * 100);
            }

            const totalPnLUSD = totalValueUSD - totalCostUSD;
            const totalPnLTWD = totalValueTWD - totalCostTWD;
            return { totalCost: totalCostUSD, totalValue: totalValueUSD, totalPnL: totalPnLUSD, totalPnLPercent: totalCostUSD > 0 ? (totalPnLUSD / totalCostUSD) * 100 : 0, totalCostTWD, totalValueTWD, totalPnLTWD, totalPnLPercentTWD: totalCostTWD > 0 ? (totalPnLTWD / totalCostTWD) * 100 : 0, holdingsWithStats };
        }

        // ==================== 操作 ====================
        function addHolding() {
            const symbol = document.getElementById('form-symbol').value.trim().toUpperCase();
            const quantity = parseFloat(document.getElementById('form-quantity').value);
            const costPrice = parseFloat(document.getElementById('form-cost').value);
            const market = document.getElementById('form-market').value;
            if (!symbol || !quantity || !costPrice) return alert('請填寫所有必要欄位');
            saveHistory();
            const existingIndex = holdings.findIndex(h => h.symbol === symbol);
            const isBuy = tradeType === 'buy';
            if (!isBuy) {
                if (existingIndex === -1) return alert('找不到持倉，無法賣出');
                const existing = holdings[existingIndex];
                const remain = existing.quantity - quantity;
                if (remain < 0) return alert('賣出數量超過持有股數');
                if (remain <= 0.000001) holdings.splice(existingIndex, 1);
                else holdings[existingIndex].quantity = remain;
            } else {
                if (existingIndex !== -1) {
                    const existing = holdings[existingIndex];
                    const totalQty = existing.quantity + quantity;
                    const newAvg = (existing.costPrice * existing.quantity + costPrice * quantity) / totalQty;
                    holdings[existingIndex].quantity = totalQty;
                    holdings[existingIndex].costPrice = parseFloat(newAvg.toFixed(4));
                } else {
                    holdings.push({ id: Date.now(), symbol, market, name: '', quantity, costPrice, currentPrice: costPrice, addedDate: new Date().toISOString() });
                }
            }
            alert(isBuy ? `✅ 已處理 ${symbol}` : `✅ 已賣出 ${symbol}`);
            document.getElementById('form-symbol').value = '';
            document.getElementById('form-quantity').value = '';
            document.getElementById('form-cost').value = '';
            renderAll();
        }

        function updateCostPrice(id, newCost) { const parsed = parseFloat(newCost); if (isNaN(parsed)) return; saveHistory(); const h = holdings.find(item => item.id === id); if (h) h.costPrice = parsed; renderAll(); }
        function updateCurrentPrice(id, newPrice) { const parsed = parseFloat(newPrice); if (isNaN(parsed)) return; saveHistory(); const h = holdings.find(item => item.id === id); if (h) h.currentPrice = parsed; renderAll(); }
        function deleteHolding(id) {
            currentDeleteId = id;
            const h = holdings.find(item => item.id === id);
            document.getElementById('confirm-text').innerHTML = `確定要刪除「${h.symbol}」的持倉嗎？<br>此操作無法復原。`;
            document.getElementById('confirm-modal').style.display = 'flex';
        }
        function confirmDelete() { saveHistory(); holdings = holdings.filter(h => h.id !== currentDeleteId); hideConfirmModal(); renderAll(); }
        function hideConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; currentDeleteId = null; }

            hideImportModal();
            saveHistory();
            holdings = IMPORT_DATA.holdings.map((item, index) => {
                let market = 'US';
                if (item.symbol.includes('.HK')) market = 'HK';
                return { id: Date.now() + index, symbol: item.symbol, market, name: item.name, quantity: item.quantity, costPrice: item.avg_cost, currentPrice: item.current_price || item.avg_cost, addedDate: new Date().toISOString() };
            });
            alert(`✅ 成功匯入 ${holdings.length} 筆持倉數據！`);
            renderAll();
        }

        function exportHoldings() {
            if (holdings.length === 0) return alert('尚無持倉');
            const rows = [['Symbol','Market','Name','Quantity','Cost Price','Current Price','Added Date'], ...holdings.map(h => [h.symbol, h.market, h.name||'', h.quantity, h.costPrice, h.currentPrice, h.addedDate||''])];
            const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `portfolio_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function refreshAllData() {
            const btn = document.getElementById('refresh-btn');
            const text = document.getElementById('refresh-text');
            const icon = document.getElementById('refresh-icon');
            btn.disabled = true; text.textContent = '更新中...'; icon.style.animation = 'spin 1s linear infinite';
            try {
                const sheetUrl = document.getElementById('sheet-url').value.trim();
                if (!sheetUrl) { alert('請先填入 Google Sheet CSV 連結'); return; }
                if (!sheetUrl.includes('docs.google.com')) { alert('URL 格式不符，請使用 Google Sheets 已發布的 CSV 連結'); return; }

                // 10 秒 timeout，避免 fetch 無限卡住
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                let res;
                try {
                    res = await fetch(sheetUrl, { signal: controller.signal });
                } catch(fetchErr) {
                    clearTimeout(timeoutId);
                    if (fetchErr.name === 'AbortError') {
                        alert('⏱ 請求逾時（10秒），請確認 Google Sheet 連結是否正確，或改用「手動輸入報價」。');
                    } else {
                        alert(`❌ 網路請求失敗：${fetchErr.message}\n\n可能原因：\n1. CORS 限制（從本地 file:// 開啟時常見）\n2. 網路連線問題\n\n建議改用「手動輸入報價」。`);
                    }
                    return;
                }
                clearTimeout(timeoutId);

                if (!res.ok) throw new Error(`伺服器回傳 HTTP ${res.status}`);

                const csvText = await res.text();

                // 若回傳的是 HTML（未正確發布），提早偵測
                if (csvText.trim().startsWith('<')) {
                    alert('❌ Google Sheet 尚未以 CSV 格式發布，或連結不正確。\n\n請在 Google Sheets → 檔案 → 共用 → 發布到網路 → 選擇「逗號分隔值(.csv)」後重試。');
                    return;
                }

                const prices = {};
                csvText.trim().split(/\r?\n/).forEach(line => {
                    const cols = line.trim().split(',').map(c => c.replace(/"/g,'').trim());
                    const val = parseFloat(cols[1]);
                    if (cols.length >= 2 && cols[0] && !isNaN(val) && val > 0) prices[cols[0]] = val;
                });

                if (Object.keys(prices).length === 0) {
                    alert('⚠️ CSV 解析後沒有有效價格資料。\n請確認 Google Sheet 格式為：\n第一欄 = 股票代碼，第二欄 = 價格\n\n改用「手動輸入報價」繼續。');
                    manualPriceReview();
                    return;
                }

                // 確認有幾筆能匹配到目前持倉
                const matchCount = holdings.filter(h => prices[h.symbol] != null).length;
                if (matchCount === 0) {
                    const sheetSymbols = Object.keys(prices).slice(0, 5).join(', ');
                    const holdingSymbols = holdings.slice(0, 5).map(h => h.symbol).join(', ');
                    alert(`⚠️ CSV 中的代碼與持倉代碼全部不符。\n\nSheet 代碼（前5筆）：${sheetSymbols}\n持倉代碼（前5筆）：${holdingSymbols}\n\n請確認 Sheet 代碼格式一致，或改用「手動輸入報價」。`);
                    return;
                }

                showPriceReview(prices);

            } catch(e) {
                alert(`❌ 更新失敗：${e.message}`);
            } finally {
                btn.disabled = false; text.textContent = '一鍵更新報價 + 匯率'; icon.style.animation = 'none';
            }
        }

        function manualPriceReview() {
            const reviewData = {};
            holdings.forEach(h => reviewData[h.symbol] = { oldPrice: h.currentPrice, newPrice: h.currentPrice, diff: 0, name: h.name||'' });
            priceReviewData = { prices: reviewData, accepted: Object.keys(reviewData).reduce((a,k)=>{a[k]=true;return a;}, {}) };
            showReviewModal();
        }
        function showPriceReview(allPrices) {
            const reviewData = {}; const accepted = {};
            holdings.forEach(h => {
                const newP = allPrices[h.symbol];
                if (newP != null && !isNaN(newP)) {
                    const newPrice = parseFloat(newP.toFixed(4));
                    const diff = Math.abs(newPrice - h.currentPrice) / h.currentPrice * 100;
                    reviewData[h.symbol] = { oldPrice: h.currentPrice, newPrice, diff: diff.toFixed(1), name: h.name||'' };
                    accepted[h.symbol] = diff < 15;
                }
            });
            priceReviewData = { prices: reviewData, accepted };
            showReviewModal();
        }
        function showReviewModal() {
            const modal = document.getElementById('review-modal');
            const tbody = document.getElementById('review-table');
            tbody.innerHTML = `
                <thead><tr style="border-bottom:2px solid rgba(251,191,36,0.3);"><th style="padding:0.5rem;text-align:center;color:#fbbf24;">✓</th><th style="padding:0.5rem;color:#fbbf24;">代碼</th><th style="padding:0.5rem;text-align:right;color:#fbbf24;">目前價</th><th style="padding:0.5rem;text-align:right;color:#fbbf24;">新價格</th><th style="padding:0.5rem;text-align:right;color:#fbbf24;">差異</th></tr></thead>
                <tbody>${Object.entries(priceReviewData.prices).map(([symbol, info]) => {
                    const checked = priceReviewData.accepted[symbol] ? 'background:#10b981;color:#fff' : '';
                    return `<tr>
                        <td onclick="toggleReviewAccept('${symbol}')" style="padding:0.5rem;text-align:center;cursor:pointer;"><div style="width:20px;height:20px;border-radius:4px;border:2px solid #10b981;${checked ? 'background:#10b981' : ''};margin:auto;">${priceReviewData.accepted[symbol]?'✓':''}</div></td>
                        <td style="padding:0.5rem;font-weight:600;cursor:pointer;" onclick="toggleReviewAccept('${symbol}')">${symbol}</td>
                        <td style="padding:0.5rem;text-align:right;color:#94a3b8;">${info.oldPrice}</td>
                        <td style="padding:0.5rem;text-align:right;"><input type="number" value="${info.newPrice}" onchange="updateReviewPrice('${symbol}', this.value)" style="width:100px;text-align:right;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:5px;color:#e2e8f0;"></td>
                        <td style="padding:0.5rem;text-align:right;color:#10b981;font-weight:600;">${info.diff}%</td>
                    </tr>`;
                }).join('')}</tbody>`;
            modal.style.display = 'flex';
        }
        function toggleReviewAccept(symbol) { priceReviewData.accepted[symbol] = !priceReviewData.accepted[symbol]; showReviewModal(); }
        function updateReviewPrice(symbol, val) {
            const newPrice = parseFloat(val);
            if (isNaN(newPrice)) return;
            priceReviewData.prices[symbol].newPrice = newPrice;
            const old = priceReviewData.prices[symbol].oldPrice;
            priceReviewData.prices[symbol].diff = (Math.abs(newPrice - old) / old * 100).toFixed(1);
            showReviewModal();
        }
        function applyReviewedPrices() {
            saveHistory();
            Object.keys(priceReviewData.accepted).forEach(symbol => {
                if (priceReviewData.accepted[symbol]) {
                    const h = holdings.find(item => item.symbol === symbol);
                    if (h) h.currentPrice = priceReviewData.prices[symbol].newPrice;
                }
            });
            hideReviewModal();
            renderAll();
            alert('✅ 已套用選取的股價更新');
        }
        function hideReviewModal() { document.getElementById('review-modal').style.display = 'none'; priceReviewData = null; }

        // ==================== 初始化 ====================
        function init() {
            holdings = IMPORT_DATA.holdings.map((item, index) => {
                let market = 'US';
                if (item.symbol.includes('.HK')) market = 'HK';
                return { id: Date.now() + index, symbol: item.symbol, market, name: item.name, quantity: item.quantity, costPrice: item.avg_cost, currentPrice: item.current_price || item.avg_cost, addedDate: new Date().toISOString() };
            });
            renderAll();
            console.log('%c✅ Portfolio Tracker 已啟動！持倉占比已修正為精準 100%', 'color:#10b981; font-size:14px;');
        }
        window.onload = init;
    </script>
</body>
</html>
