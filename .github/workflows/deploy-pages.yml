# GitHub Pages 部署（取代原本的 branch 自動部署）
#
# 為什麼存在：branch 部署模式下每次 push main 都觸發建置（軟上限 ~10 次/小時），
# 而 Render 後端頻繁 commit data/cache.json（前端從 raw.githubusercontent 讀，不經 Pages）、
# 每日 8MB portfolio_backup.db（前端不使用）→ 大量不必要的部署互相排擠 → 「Deployment failed, try again later」洗版。
# 本 workflow 只在「真正需要上線的檔案」變動時部署。
#
# 注意：update-fundamentals.yml 用預設 GITHUB_TOKEN push，其 commit 不會觸發 on:push
# （GitHub 防遞迴規則）→ 必須靠 workflow_run 觸發器接力，否則線上 fundamentals.json 會停更。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/cache.json'
      - 'data/portfolio_backup.db'
  workflow_run:
    workflows: ["Update Fundamentals Data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_run 只在 fundamentals 成功時接力；push / 手動觸發不受此限
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Drop unused backup from artifact
        run: rm -f data/portfolio_backup.db   # 8MB 備份檔前端不讀，不需要進 Pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
