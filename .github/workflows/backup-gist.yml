name: Backup Gist to SQLite

on:
  schedule:
    - cron: '30 20 * * *'           # UTC 20:30 = 台灣 04:30（每天凌晨）
  workflow_dispatch:                 # 允許手動觸發

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write                # 允許 push .db 檔案

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Gist backup
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python data/gist_backup.py

      - name: Commit & push updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio_backup.db
          git diff --cached --quiet || git commit -m "chore: daily gist backup $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
